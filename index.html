<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Probability & Statistics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0d14;--surface:#111520;--surface2:#161c2b;--border:#1e2638;
      --accent:#5b8dee;--accent2:#a78bfa;--red:#e05555;
      --text:#dde3f0;--muted:#4e5a72;--muted2:#7a8aaa;
    }
    body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}
    .wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:0 28px 100px}

    header{padding:60px 0 28px;border-bottom:1px solid var(--border);margin-bottom:36px}
    .header-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
    h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.6rem);font-weight:700;line-height:1.05;color:var(--text)}
    h1 em{font-style:italic;font-weight:400;color:var(--accent2)}
    .formula{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted2);background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:4px;white-space:nowrap;align-self:flex-start;margin-top:6px}
    .meta{display:flex;align-items:center;gap:24px;margin-top:20px;flex-wrap:wrap}
    .chip{display:flex;align-items:baseline;gap:5px}
    .chip .n{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text)}
    .chip .l{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
    .sep{width:1px;height:26px;background:var(--border)}
    .admin-link{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);text-decoration:none;border:1px solid var(--border);padding:8px 16px;border-radius:4px;transition:all .15s}
    .admin-link:hover{color:var(--text);border-color:var(--accent)}

    .search-row{margin-bottom:28px;position:relative}
    .search-row input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 20px 12px 44px;font-family:'IBM Plex Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s}
    .search-row input:focus{border-color:var(--accent)}
    .search-row input::placeholder{color:var(--muted)}
    .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}

    .tabs{display:flex;gap:7px;margin-bottom:28px;flex-wrap:wrap}
    .tab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:transparent;color:var(--muted2);transition:all .15s}
    .tab:hover{background:var(--surface2);color:var(--text);border-color:var(--muted2)}
    .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .card{position:relative;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:26px 24px 22px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:8px;background:var(--surface);opacity:0;animation:fadeIn .35s forwards;overflow:hidden;transition:background .2s}
    .card:hover{background:var(--surface2)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform .25s ease;z-index:1}
    .card:hover::before{transform:scaleX(1)}
    .card>*{position:relative;z-index:1}
    .cn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
    .ct{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;line-height:1.25;color:var(--text)}
    .cd{font-size:.82rem;color:var(--muted2);line-height:1.55;flex:1}
    .cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
    .ctag{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);border:1px solid rgba(91,141,238,.25);padding:2px 7px;border-radius:2px;background:rgba(91,141,238,.08)}
    .ca{font-size:17px;color:var(--muted);transition:color .2s,transform .2s}
    .card:hover .ca{color:var(--accent2);transform:translate(3px,-3px)}

    .empty{grid-column:1/-1;padding:60px;text-align:center;color:var(--muted2)}
    .empty .em{font-size:2.5rem;color:var(--border);font-family:'Playfair Display',serif;margin-bottom:12px}
    .loading{grid-column:1/-1;padding:60px;text-align:center;color:var(--muted2);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em}

    .bar{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.05em}
    footer{margin-top:56px;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
    footer a{color:var(--accent2);text-decoration:none}
    footer a:hover{text-decoration:underline}
    footer .brand{color:var(--accent2)}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:600px){#grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <header>
    <div class="header-row">
      <div>
        <p class="eyebrow">Repository Index</p>
        <h1>Visual <br/><em>Probability & Statistics</em></h1>
      </div>
      <div class="formula">f(x) = (1/σ√2π) · e^(-(x-μ)²/2σ²)</div>
    </div>
    <div class="meta">
      <div class="chip"><span class="n" id="tc">—</span><span class="l">Pages</span></div>
      <div class="sep"></div>
      <div class="chip"><span class="n" id="cc">—</span><span class="l">Topics</span></div>
    </div>
    <a href="admin.html" class="admin-link">⚙ Admin</a>
  </header>

  <div class="search-row">
    <span class="si">⌕</span>
    <input type="text" id="search" placeholder="Search… e.g. Bayes, regression, CLT"/>
  </div>
  <div class="tabs" id="tabs"><button class="tab active" data-cat="all">All</button></div>
  <div id="grid"><div class="loading">Loading pages…</div></div>
  <p class="bar" id="bar"></p>
  <footer>
    <span>Auto-indexed via GitHub Actions · <a href="admin.html" style="color:var(--accent2)">Admin panel →</a></span>
    <span class="brand">P(A|B) = P(B|A)·P(A)/P(B)</span>
  </footer>
</div>

<script>
let pages=[], activeTab='all', query='';

async function load(){
  try{
    const r = await fetch('pages.json?v='+Date.now());
    pages = await r.json();
  }catch(e){ pages=[]; }
  updateStats(); rebuildTabs(); renderGrid();
}

function updateStats(){
  const cats=[...new Set(pages.map(p=>p.category).filter(Boolean))];
  document.getElementById('tc').textContent=pages.length;
  document.getElementById('cc').textContent=cats.length;
}

function rebuildTabs(){
  const el=document.getElementById('tabs');
  const cats=[...new Set(pages.map(p=>p.category).filter(Boolean))].sort();
  el.innerHTML=`<button class="tab${activeTab==='all'?' active':''}" data-cat="all">All</button>`;
  cats.forEach(cat=>{
    const b=document.createElement('button');
    b.className=`tab${activeTab===cat?' active':''}`;
    b.dataset.cat=cat; b.textContent=cat; el.appendChild(b);
  });
}

document.getElementById('tabs').addEventListener('click',e=>{
  if(!e.target.matches('.tab')) return;
  activeTab=e.target.dataset.cat; rebuildTabs(); renderGrid();
});

function renderGrid(){
  const g=document.getElementById('grid'), bar=document.getElementById('bar');
  const f=pages.filter(p=>{
    const mc=activeTab==='all'||p.category===activeTab;
    const mq=!query||p.title.toLowerCase().includes(query)||(p.desc||'').toLowerCase().includes(query)||(p.category||'').toLowerCase().includes(query);
    return mc&&mq;
  });
  g.innerHTML='';
  if(!f.length){
    g.innerHTML='<div class="empty"><div class="em">∅</div><p>No pages found.</p></div>';
    bar.textContent=''; return;
  }
  f.forEach((p,i)=>{
    const a=document.createElement('a');
    a.className='card'; a.href=p.url||'#'; a.target='_blank';
    a.style.animationDelay=`${i*45}ms`;
    a.innerHTML=`
      <span class="cn">${String(i+1).padStart(2,'0')} / ${String(f.length).padStart(2,'0')}</span>
      <h2 class="ct">${p.title}</h2>
      <p class="cd">${p.desc||''}</p>
      <div class="cfoot">
        <span class="ctag">${p.category||'General'}</span>
        <span class="ca">↗</span>
      </div>`;
    g.appendChild(a);
  });
  bar.textContent=`Showing ${f.length} of ${pages.length} pages`;
}

document.getElementById('search').addEventListener('input',e=>{query=e.target.value.toLowerCase();renderGrid();});
load();

// Canvas
const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
let W,H,t=0;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
window.addEventListener('resize',resize);resize();
function g(x,mu,s){return Math.exp(-0.5*((x-mu)/s)**2);}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(80,100,140,.18)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  [{mu:.38,s:.09,c:'rgba(91,141,238,.35)',o:0},{mu:.60,s:.14,c:'rgba(167,139,250,.25)',o:Math.PI},{mu:.50,s:.06,c:'rgba(91,141,238,.2)',o:Math.PI/2}]
  .forEach(({mu,s,c,o})=>{
    const sh=Math.sin(t+o)*.015;
    ctx.beginPath();
    for(let px=0;px<=W;px+=2){const nx=px/W;const py=H*.78-g(nx,mu+sh,s)*H*.55;px===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
    ctx.strokeStyle=c;ctx.lineWidth=2.5;ctx.stroke();
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=c.replace(/[\d.]+\)$/,'.04)');ctx.fill();
  });
  t+=.005;requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
