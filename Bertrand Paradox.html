<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bertrand Paradox — Interactive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #0d0d0f;
    --panel: #13131a;
    --border: #2a2a38;
    --m1: #e8c97a;
    --m2: #7ac4e8;
    --m3: #a87ae8;
    --text: #d8d8e8;
    --muted: #666688;
    --chord-alpha: 0.35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 400;
    letter-spacing: 0.02em;
    color: #f0ead8;
  }

  header p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 1060px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card:nth-child(1)::before { background: var(--m1); }
  .card:nth-child(2)::before { background: var(--m2); }
  .card:nth-child(3)::before { background: var(--m3); }

  .method-label {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .method-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-style: italic;
    text-align: center;
    line-height: 1.3;
  }
  .card:nth-child(1) .method-name { color: var(--m1); }
  .card:nth-child(2) .method-name { color: var(--m2); }
  .card:nth-child(3) .method-name { color: var(--m3); }

  canvas {
    border-radius: 8px;
    display: block;
  }

  .prob-display {
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .card:nth-child(1) .prob-display { color: var(--m1); }
  .card:nth-child(2) .prob-display { color: var(--m2); }
  .card:nth-child(3) .prob-display { color: var(--m3); }

  .prob-theory {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    font-size: 0.68rem;
    color: var(--muted);
  }

  .stats-row span b {
    color: var(--text);
    font-weight: 500;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 20px 0 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  button:hover {
    border-color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  button.primary {
    border-color: #e8c97a66;
    color: var(--m1);
  }
  button.primary:hover { border-color: var(--m1); background: rgba(232,201,122,0.06); }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.68rem;
    color: var(--muted);
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 90px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--m1);
    border-radius: 50%;
    cursor: pointer;
  }

  .footer-note {
    font-size: 0.63rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    margin-top: 10px;
    line-height: 1.7;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Bertrand Paradox</h1>
  <p>Three methods · Three probabilities · One circle</p>
</header>

<div class="layout" id="layout"></div>

<div class="controls">
  <button class="primary" id="btnRun">▶ Run Simulation</button>
  <button id="btnPause">⏸ Pause</button>
  <button id="btnReset">↺ Reset</button>
  <div class="speed-wrap">
    <span>Speed</span>
    <input type="range" id="speed" min="1" max="60" value="20">
  </div>
</div>

<div class="footer-note">
  Gold chords are longer than the inscribed equilateral triangle side &nbsp;·&nbsp; Dim chords are shorter<br>
  Each method yields a different probability despite all being "uniformly random"
</div>

<script>
const R = 110;        // circle radius in canvas coords
const CX = 130, CY = 130;   // center
const SIZE = 260;
const THRESH = R * Math.sqrt(3); // equilateral triangle side = R√3

const METHODS = [
  { id: 'm1', label: 'Method I', name: 'Random\nEndpoints', theory: '1 / 3', color: '#e8c97a' },
  { id: 'm2', label: 'Method II', name: 'Random\nMidpoint on Radius', theory: '1 / 2', color: '#7ac4e8' },
  { id: 'm3', label: 'Method III', name: 'Random\nMidpoint in Disk', theory: '1 / 4', color: '#a87ae8' },
];

const state = METHODS.map(() => ({ total: 0, longer: 0 }));
let canvases = [], ctxs = [];
let probEls = [], totalEls = [], longerEls = [];
let running = false, animId = null;
const MAX_VISIBLE = 1800;
const chordBuffers = [[], [], []]; // ring buffer of drawn chords

function buildUI() {
  const layout = document.getElementById('layout');
  METHODS.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="method-label">${m.label}</div>
      <div class="method-name">${m.name.replace('\n','<br>')}</div>
      <canvas id="cv${i}" width="${SIZE}" height="${SIZE}"></canvas>
      <div class="prob-display" id="prob${i}">—</div>
      <div class="prob-theory">theoretical: <b>${m.theory}</b></div>
      <div class="stats-row">
        <span>total <b id="tot${i}">0</b></span>
        <span>longer <b id="lng${i}">0</b></span>
      </div>
    `;
    layout.appendChild(card);
    const cv = card.querySelector(`#cv${i}`);
    canvases.push(cv);
    ctxs.push(cv.getContext('2d'));
    probEls.push(document.getElementById(`prob${i}`));
    totalEls.push(document.getElementById(`tot${i}`));
    longerEls.push(document.getElementById(`lng${i}`));
  });
}

function drawBase(ctx, color) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  // Background
  ctx.fillStyle = '#0d0d12';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Circle
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#2a2a44';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inscribed equilateral triangle (one vertex at top)
  ctx.beginPath();
  for (let k = 0; k < 3; k++) {
    const a = -Math.PI / 2 + (k * 2 * Math.PI) / 3;
    const x = CX + R * Math.cos(a);
    const y = CY + R * Math.sin(a);
    k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = color + '55';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function chordLength(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function sampleMethod1() {
  // Pick 2 random angles on circumference → endpoints always on circle
  const a1 = Math.random() * 2 * Math.PI;
  const a2 = Math.random() * 2 * Math.PI;
  const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
  const x2 = CX + R * Math.cos(a2), y2 = CY + R * Math.sin(a2);
  return { x1, y1, x2, y2, longer: chordLength(x1,y1,x2,y2) > THRESH };
}

function sampleMethod2() {
  // Fix one endpoint, pick a random radius direction, random distance along it.
  // The chord is perpendicular to that radius at that point.
  // Chord endpoints: fix radius angle θ, midpoint at distance d from center.
  // The two endpoints are at angle θ ± arccos(d/R) on the circumference.
  const theta = Math.random() * 2 * Math.PI; // radius direction
  const d = Math.random() * R;               // distance from center (uniform on [0,R])
  const phi = Math.acos(d / R);              // half-angle subtended
  const a1 = theta + phi;
  const a2 = theta - phi;
  const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
  const x2 = CX + R * Math.cos(a2), y2 = CY + R * Math.sin(a2);
  return { x1, y1, x2, y2, longer: chordLength(x1,y1,x2,y2) > THRESH };
}

function sampleMethod3() {
  // Random midpoint uniformly inside the disk.
  // Given midpoint (mx,my), the chord perpendicular to the radius through (mx,my)
  // has endpoints at angle atan2(my,mx) ± arccos(d/R) on the circumference.
  let mx, my, d;
  do {
    mx = (Math.random() * 2 - 1) * R;
    my = (Math.random() * 2 - 1) * R;
    d = Math.hypot(mx, my);
  } while (d >= R);
  // For a chord with midpoint at (mx,my), the chord direction is perpendicular
  // to the radius vector. Endpoints are at angles theta ± arccos(d/R).
  const theta = Math.atan2(my, mx);
  const phi = Math.acos(d / R);
  const a1 = theta + phi;
  const a2 = theta - phi;
  const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
  const x2 = CX + R * Math.cos(a2), y2 = CY + R * Math.sin(a2);
  return { x1, y1, x2, y2, longer: chordLength(x1,y1,x2,y2) > THRESH };
}

const samplers = [sampleMethod1, sampleMethod2, sampleMethod3];

function redrawCanvas(i) {
  const ctx = ctxs[i];
  const color = METHODS[i].color;
  drawBase(ctx, color);
  const buf = chordBuffers[i];
  for (const c of buf) {
    ctx.beginPath();
    ctx.moveTo(c.x1, c.y1);
    ctx.lineTo(c.x2, c.y2);
    ctx.strokeStyle = c.longer ? color + 'bb' : '#444466';
    ctx.lineWidth = c.longer ? 0.9 : 0.5;
    ctx.stroke();
  }
}

function addChords(batchSize) {
  for (let i = 0; i < 3; i++) {
    const buf = chordBuffers[i];
    for (let b = 0; b < batchSize; b++) {
      const chord = samplers[i]();
      state[i].total++;
      if (chord.longer) state[i].longer++;
      buf.push(chord);
      if (buf.length > MAX_VISIBLE) buf.shift();
    }
    redrawCanvas(i);
    const p = state[i].total > 0 ? (state[i].longer / state[i].total) : 0;
    probEls[i].textContent = p.toFixed(3);
    totalEls[i].textContent = state[i].total.toLocaleString();
    longerEls[i].textContent = state[i].longer.toLocaleString();
  }
}

function getSpeed() {
  return parseInt(document.getElementById('speed').value);
}

function step() {
  if (!running) return;
  addChords(getSpeed());
  animId = requestAnimationFrame(step);
}

buildUI();
// Draw empty bases
METHODS.forEach((m, i) => drawBase(ctxs[i], m.color));

document.getElementById('btnRun').addEventListener('click', () => {
  if (!running) { running = true; step(); }
});

document.getElementById('btnPause').addEventListener('click', () => {
  running = false;
  cancelAnimationFrame(animId);
});

document.getElementById('btnReset').addEventListener('click', () => {
  running = false;
  cancelAnimationFrame(animId);
  for (let i = 0; i < 3; i++) {
    state[i].total = 0; state[i].longer = 0;
    chordBuffers[i].length = 0;
    drawBase(ctxs[i], METHODS[i].color);
    probEls[i].textContent = '—';
    totalEls[i].textContent = '0';
    longerEls[i].textContent = '0';
  }
});
</script>
</body>
</html>
